<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funbox - Retro Emulator Runtime</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      color: #fff;
    }

    #game {
      width: 100%;
      height: 100%;
    }

    /* Retro/modern loading screen styling */
    #loader {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #070814;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(0, 240, 255, 0.1);
      border-radius: 50%;
      border-top-color: #00f0ff;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 1.5rem;
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      font-size: 1.1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: bold;
      color: #00f0ff;
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
    }

    .loader-subtext {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-top: 0.5rem;
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body>
  <div id="loader">
    <div class="spinner"></div>
    <div class="loader-text">Loading Core</div>
    <div class="loader-subtext">Initializing WebAssembly Core & Game Files...</div>
  </div>

  <div id="game"></div>

  <script type="text/javascript">
    // Parse query params to configure emulator
    const params = new URLSearchParams(window.location.search);
    const gameUrl = params.get('gameUrl');
    const gameName = params.get('gameName') || 'Retro Game';
    const core = params.get('core') || 'n64';

    // Set dynamic loader text
    const loaderText = document.querySelector('.loader-text');
    if (loaderText) {
      loaderText.textContent = `Loading ${core.toUpperCase()} Core`;
    }

    // Assign global configuration to EJS
    window.EJS_player = '#game';
    window.EJS_core = core;
    window.EJS_gameUrl = gameUrl;
    window.EJS_gameName = gameName;
    window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

    // Configure default controls object structure in EJS format:
    if (core === 'n64') {
      window.EJS_defaultControls = {
        0: {
          0: { 'value': 'x', 'value2': 'BUTTON_2' },   // N64 B Button
          8: { 'value': 'z', 'value2': 'BUTTON_1' },   // N64 A Button
          12: { 'value': 'shift', 'value2': 'BUTTON_7' }, // N64 Z Trigger
          3: { 'value': 'enter', 'value2': 'START' },  // Start

          // DPAD
          4: { 'value': '', 'value2': 'DPAD_UP' },
          5: { 'value': '', 'value2': 'DPAD_DOWN' },
          6: { 'value': '', 'value2': 'DPAD_LEFT' },
          7: { 'value': '', 'value2': 'DPAD_RIGHT' },

          // L / R Shoulder
          10: { 'value': 'q', 'value2': 'LEFT_TOP_SHOULDER' },
          11: { 'value': 'e', 'value2': 'RIGHT_TOP_SHOULDER' },

          // L STICK (N64 Analog Stick mapping - bind default arrow keys)
          19: { 'value': 'up arrow', 'value2': 'LEFT_STICK_Y:-1' },
          18: { 'value': 'down arrow', 'value2': 'LEFT_STICK_Y:+1' },
          17: { 'value': 'left arrow', 'value2': 'LEFT_STICK_X:-1' },
          16: { 'value': 'right arrow', 'value2': 'LEFT_STICK_X:+1' },

          // R STICK (N64 C-Buttons mapping - bind WASD)
          23: { 'value': 'w', 'value2': 'RIGHT_STICK_Y:-1' }, // C-UP
          22: { 'value': 's', 'value2': 'RIGHT_STICK_Y:+1' }, // C-DOWN
          21: { 'value': 'a', 'value2': 'RIGHT_STICK_X:-1' }, // C-LEFT
          20: { 'value': 'd', 'value2': 'RIGHT_STICK_X:+1' }  // C-RIGHT
        },
        1: {},
        2: {},
        3: {}
      };
    } else if (core === 'gba') {
      // gba default controls configuration (same key binds as snes basically)
      window.EJS_defaultControls = {
        0: {
          0: { 'value': 'z', 'value2': 'BUTTON_2' },   // GBA B Button
          8: { 'value': 'x', 'value2': 'BUTTON_1' },   // GBA A Button
          2: { 'value': 'shift', 'value2': 'SELECT' }, // GBA Select
          3: { 'value': 'enter', 'value2': 'START' },  // GBA Start

          // DPAD
          4: { 'value': 'up arrow', 'value2': 'DPAD_UP' },
          5: { 'value': 'down arrow', 'value2': 'DPAD_DOWN' },
          6: { 'value': 'left arrow', 'value2': 'DPAD_LEFT' },
          7: { 'value': 'right arrow', 'value2': 'DPAD_RIGHT' },

          // L / R Shoulder
          10: { 'value': 'q', 'value2': 'LEFT_TOP_SHOULDER' },
          11: { 'value': 'e', 'value2': 'RIGHT_TOP_SHOULDER' }
        },
        1: {},
        2: {},
        3: {}
      };
    } else {
      // snes default controls configuration
      window.EJS_defaultControls = {
        0: {
          0: { 'value': 'z', 'value2': 'BUTTON_2' },   // SNES B Button
          8: { 'value': 'x', 'value2': 'BUTTON_1' },   // SNES A Button
          1: { 'value': 'a', 'value2': 'BUTTON_4' },   // SNES Y Button
          9: { 'value': 's', 'value2': 'BUTTON_3' },   // SNES X Button
          2: { 'value': 'shift', 'value2': 'SELECT' }, // SNES Select
          3: { 'value': 'enter', 'value2': 'START' },  // SNES Start

          // DPAD
          4: { 'value': 'up arrow', 'value2': 'DPAD_UP' },
          5: { 'value': 'down arrow', 'value2': 'DPAD_DOWN' },
          6: { 'value': 'left arrow', 'value2': 'DPAD_LEFT' },
          7: { 'value': 'right arrow', 'value2': 'DPAD_RIGHT' },

          // L / R Shoulder
          10: { 'value': 'q', 'value2': 'LEFT_TOP_SHOULDER' },
          11: { 'value': 'e', 'value2': 'RIGHT_TOP_SHOULDER' }
        },
        1: {},
        2: {},
        3: {}
      };
    }

    // Callback when emulator core has loaded successfully
    window.EJS_ready = function () {
      const loader = document.getElementById('loader');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
        }, 500);
      }
    };
  </script>
  <!-- Load the EmulatorJS script loader -->
  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>

</html>
